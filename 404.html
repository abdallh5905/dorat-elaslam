<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - الصفحة غير موجودة | درة الإسلام للعمرة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #01323b;
            --secondary: #FFFFFF;
            --accent: #ffdf46;
            --light-gray: #e6f4f4;
            --whatsapp: #25D366;
            --call: #1E88E5;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }
        body {
            background: var(--light-gray);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .error-container {
            max-width: 650px;
            background: var(--secondary);
            border-radius: 30px;
            padding: 50px 40px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.1);
            animation: fadeIn 0.8s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .moon-icon {
            font-size: 4.5rem;
            color: var(--accent);
            margin-bottom: 20px;
            display: inline-block;
            background: rgba(255,223,70,0.15);
            width: 110px;
            height: 110px;
            line-height: 110px;
            border-radius: 50%;
        }
        h1 {
            font-size: 6rem;
            font-weight: 800;
            color: var(--primary);
            line-height: 1;
            margin-bottom: 5px;
        }
        h2 {
            font-size: 1.8rem;
            margin-bottom: 15px;
            color: var(--primary);
        }
        p {
            font-size: 1.1rem;
            color: #0f3940;
            margin-bottom: 30px;
            line-height: 1.7;
        }
        .buttons-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
            border: none;
            cursor: pointer;
            min-width: 150px;
        }
        .btn i {
            margin-left: 8px;
        }
        .btn-home {
            background: var(--accent);
            color: var(--primary);
        }
        .btn-home:hover {
            background: #e5c933;
        }
        .btn-call {
            background: var(--call);
            color: #fff;
        }
        .btn-call:hover {
            background: #1976D2;
        }
        .btn-whatsapp {
            background: var(--whatsapp);
            color: #fff;
        }
        .btn-whatsapp:hover {
            background: #20b858;
        }
        .btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 28px rgba(0,0,0,0.2);
        }
        @media (max-width: 480px) {
            h1 { font-size: 4.5rem; }
            .error-container { padding: 40px 20px; }
            .btn { min-width: 130px; padding: 12px 20px; font-size: 0.95rem; }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="moon-icon">
            <i class="fas fa-moon"></i>
        </div>
        <h1>404</h1>
        <h2>عذراً، الصفحة غير موجودة</h2>
        <p>
            يبدو أن الرابط الذي تحاول الوصول إليه غير صحيح أو تم نقله.<br>
            يمكنك العودة إلى الصفحة الرئيسية أو التواصل معنا مباشرة.
        </p>
        <div class="buttons-group">
            <a href="https://aleslam.site" class="btn btn-home">
                <i class="fas fa-home"></i> الرئيسية
            </a>
            <a href="tel:+966510299518" class="btn btn-call">
                <i class="fas fa-phone"></i> اتصل الآن
            </a>
            <a href="https://wa.me/966510299518" class="btn btn-whatsapp">
                <i class="fab fa-whatsapp"></i> واتساب
            </a>
        </div>
    </div>
</body>
</html>
